name: "New Hook"
description: Request a new Claude Code lifecycle hook.
title: "[hook] "
labels:
  - "type:hook"
  - "action:create"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what this hook does and when it fires.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What behaviour does this hook automate or enforce? Why can't a skill or setting handle it?
    validations:
      required: true

  - type: dropdown
    id: event
    attributes:
      label: Hook event
      options:
        - PreToolUse
        - PostToolUse
        - Stop
        - Notification
        - SubagentStop
    validations:
      required: true

  - type: input
    id: matcher
    attributes:
      label: Tool / event matcher
      description: "For PreToolUse/PostToolUse: which tool(s) to match (e.g. `Bash`, `Edit`, `*`)."
      placeholder: "Bash"

  - type: textarea
    id: command-sketch
    attributes:
      label: Command sketch
      description: |
        Draft of the shell command or script path that should run.
        Reference `claude/templates/hooks/` for existing patterns.
    validations:
      required: true

  - type: dropdown
    id: target-settings
    attributes:
      label: Target settings file
      description: Where should this hook be registered?
      options:
        - Project — `.claude/settings.json`
        - User — `~/.claude/settings.json`
        - Local (untracked) — `.claude/settings.local.json`
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Hook script exists at the specified path (if external)
        - [ ] Hook entry added to the correct settings file
        - [ ] Hook fires as expected on a test tool call
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Optional.
