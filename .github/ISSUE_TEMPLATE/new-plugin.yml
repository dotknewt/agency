name: "New Plugin"
description: Request a new distributable plugin bundle.
title: "[plugin] "
labels:
  - "type:plugin"
  - "action:create"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what this plugin provides and who would install it.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why package this as a plugin rather than a standalone skill or agent?
    validations:
      required: true

  - type: input
    id: plugin-name
    attributes:
      label: Plugin name
      description: "Lowercase, hyphens only. Will become `plugins/<name>/` and the `name` in `plugin.json`."
      placeholder: my-plugin-name
    validations:
      required: true

  - type: checkboxes
    id: contents
    attributes:
      label: Plugin contents
      description: What does this plugin bundle?
      options:
        - label: "Skills (`skills/` entries)"
        - label: "Slash commands (`.claude/commands/`)"
        - label: "Agents (`.claude/agents/`)"
        - label: "Hooks (`.claude/settings.json` entries)"
        - label: "MCP server config"

  - type: textarea
    id: contents-detail
    attributes:
      label: Contents detail
      description: |
        List each bundled artifact by name/path. For skills, include the trigger description.
        For commands, include the command name and what it does.
    validations:
      required: true

  - type: checkboxes
    id: marketplace
    attributes:
      label: Marketplace registration
      description: Should this plugin be registered in the local marketplace?
      options:
        - label: "Yes — add an entry to `/.claude-plugin/marketplace.json`"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] `plugins/<name>/.claude-plugin/plugin.json` exists with valid manifest
        - [ ] All bundled artifacts are present and functional
        - [ ] Marketplace entry added (if checked above)
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Optional.
