name: "New MCP Server"
description: Request a new Model Context Protocol server.
title: "[mcp] "
labels:
  - "type:mcp"
  - "action:create"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what tools/resources this MCP server exposes and who uses them.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What capability gap does this fill? Why an MCP server rather than a skill or hook?
    validations:
      required: true

  - type: input
    id: server-name
    attributes:
      label: Server name
      description: "Lowercase, hyphens only. Will become `mcp/<name>/`."
      placeholder: my-mcp-server
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - SSE (HTTP)
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Language / runtime
      options:
        - Node.js / TypeScript
        - Python
        - Go
        - Other (describe in tools sketch)
    validations:
      required: true

  - type: dropdown
    id: packaging
    attributes:
      label: Packaging target
      description: How will this server be run?
      options:
        - npx / node (direct)
        - Docker image (local)
        - Docker MCP Gateway (catalog entry)
        - Undecided
    validations:
      required: true

  - type: textarea
    id: tools-sketch
    attributes:
      label: Tools / resources sketch
      description: |
        List each MCP tool or resource this server will expose. For each, include:
        name, description, key parameters, and what it returns.
    validations:
      required: true

  - type: textarea
    id: env-vars
    attributes:
      label: Environment variables / secrets
      description: |
        List any env vars or secrets the server needs (e.g. `MY_API_KEY`).
        Do NOT include actual values.
      placeholder: |
        - `SERVER_URL` — base URL of the target service
        - `API_KEY` — auth token

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] `mcp/<name>/` directory exists with source and build files
        - [ ] Server starts without errors and lists tools via MCP inspector
        - [ ] Packaging target (Dockerfile / catalog entry) is present if applicable
        - [ ] Secrets injected correctly (not hardcoded)
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Optional. See `mcp/ludus/README.md` for Docker MCP Gateway packaging pattern.
