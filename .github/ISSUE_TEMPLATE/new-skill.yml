name: "New Skill"
description: Request a new Claude Code skill.
title: "[skill] "
labels:
  - "type:skill"
  - "action:create"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what this skill does and when it should activate.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this skill solve? Why now?
    validations:
      required: true

  - type: input
    id: skill-name
    attributes:
      label: Skill name
      description: |
        Lowercase, hyphens only. Must match the directory name under `skills/`
        (e.g. `range-config` → `skills/range-config/SKILL.md`).
      placeholder: my-skill-name
    validations:
      required: true

  - type: textarea
    id: trigger-description
    attributes:
      label: Trigger description
      description: |
        The `description:` paragraph in SKILL.md frontmatter — this is the primary signal
        for automatic activation. Be precise about phrase patterns and context cues.
        Keep it to one paragraph (≤10 sentences).
    validations:
      required: true

  - type: textarea
    id: trigger-phrases
    attributes:
      label: Example trigger phrases
      description: A few user messages that should activate this skill.
      placeholder: |
        - "create a new skill for X"
        - "add a skill that does Y"
    validations:
      required: true

  - type: textarea
    id: instructions-sketch
    attributes:
      label: Instructions sketch
      description: |
        Draft of the skill body (markdown instructions). The final SKILL.md must stay
        under 500 lines — heavy reference material goes in `skills/<name>/references/`.
    validations:
      required: true

  - type: checkboxes
    id: supporting-files
    attributes:
      label: Supporting files needed
      options:
        - label: "`references/` subdirectory with supporting docs"
        - label: "`scripts/` subdirectory with helper scripts"
        - label: Neither — SKILL.md is self-contained"

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Bullet checklist the implementing agent can self-verify against.
      placeholder: |
        - [ ] `skills/<name>/SKILL.md` exists with valid frontmatter
        - [ ] Skill activates on the example trigger phrases
        - [ ] Body is under 500 lines
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to related issues, files, or prior art. Optional.
