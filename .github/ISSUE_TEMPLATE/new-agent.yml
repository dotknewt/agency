name: "New Agent"
description: Request a new Claude Code subagent definition.
title: "[agent] "
labels:
  - "type:agent"
  - "action:create"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph — what this agent does and when it should be invoked.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this agent solve? Why is an agent the right shape rather than a skill or hook?
    validations:
      required: true

  - type: input
    id: agent-name
    attributes:
      label: Agent name
      description: "Lowercase, hyphens only. Will become the subagent_type value (e.g. `code-reviewer`)."
      placeholder: my-agent-name
    validations:
      required: true

  - type: dropdown
    id: tool-set
    attributes:
      label: Allowed tool set
      description: Which tools should this agent have access to?
      options:
        - Read-only (Read, Bash[readonly], WebFetch, WebSearch)
        - Standard (Bash, Read, Edit, Write)
        - Full (all tools)
        - Custom (describe in system-prompt sketch below)
    validations:
      required: true

  - type: textarea
    id: system-prompt
    attributes:
      label: System-prompt sketch
      description: |
        Draft the agent's system prompt — what role it plays, what it must/must not do,
        and any domain-specific constraints. Bullet points are fine.
    validations:
      required: true

  - type: textarea
    id: trigger-description
    attributes:
      label: When to invoke
      description: |
        Describe the trigger conditions precisely — this becomes the `description` field
        in the agent definition and is the primary signal Claude uses to decide when to spawn it.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: Bullet checklist the implementing agent can self-verify against before closing this issue.
      placeholder: |
        - [ ] Agent file exists at `.claude/agents/<name>.md`
        - [ ] System prompt covers all described constraints
        - [ ] Tested in at least one real session
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to related issues, files, external docs, or prior art. Optional.
