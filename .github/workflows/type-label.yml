name: Apply type label from dropdown

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Extract artifact type from issue body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // Issue forms render dropdowns as: "### Artifact type\n\nagent"
            const match = body.match(/###\s+Artifact type\s*\n+\s*(agent|skill|plugin|hook|mcp)\b/i);
            if (match) {
              core.setOutput('type', match[1].toLowerCase());
            } else {
              core.setOutput('type', '');
            }

      - name: Add type label
        if: steps.extract.outputs.type != ''
        uses: actions/github-script@v7
        with:
          script: |
            const type = '${{ steps.extract.outputs.type }}';
            const label = `type:${type}`;
            const existing = context.payload.issue.labels.map(l => l.name);
            const typeLabels = ['type:agent','type:skill','type:plugin','type:hook','type:mcp'];

            // Remove stale type labels (in case issue was edited to change type)
            for (const stale of typeLabels.filter(l => l !== label && existing.includes(l))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: stale,
              });
            }

            // Add the correct type label if not already present
            if (!existing.includes(label)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              });
            }
