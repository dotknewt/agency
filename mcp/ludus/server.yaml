name: ludus-mcp
image: ludus-mcp:local
type: server
meta:
  category: security
  tags:
    - security
    - cyber-range
    - ludus
about:
  title: Ludus MCP
  description: >
    Manage Ludus cyber ranges from an AI assistant — discover Ludus API
    operations, inspect their schemas, and execute them (deploy ranges, build
    templates, manage snapshots, run testing mode) against your Ludus server.
  icon: https://docs.ludus.cloud/img/logo.png
source:
  project: https://gitlab.com/badsectorlabs/ludus-mcp
run:
  # Optional: mount a host dir for call_ludus_api multipart file-upload ops.
  # Files passed to uploads must be referenced by their container-side path
  # (e.g. /uploads/role.tar.gz). Leave upload_dir unset to skip the mount.
  volumes:
    - '{{ludus-mcp.upload_dir}}:/uploads'
config:
  description: >
    Connect to a Ludus server. Set the API key as a secret and the server URL
    as a parameter. If Ludus runs on this machine's localhost, use
    host.docker.internal (not 127.0.0.1) so the container can reach it.
  secrets:
    - name: ludus-mcp.api_key
      env: LUDUS_API_KEY
      example: <YOUR_LUDUS_API_KEY>
  env:
    - name: LUDUS_URL
      example: https://198.51.100.1:8080
      value: '{{ludus-mcp.url}}'
  parameters:
    type: object
    properties:
      url:
        type: string
      upload_dir:
        type: string
    required:
      - url
